<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | Online Safety Awareness</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#00b4db,#0083b0,#4facfe,#00f2fe);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
width:380px;
transition:0.3s;
}

.container:hover{
transform:translateY(-5px);
}

h2{
text-align:center;
color:#0083b0;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:500;
}

.input-box{
position:relative;
}

.input-box input{
width:100%;
padding:12px 40px 12px 12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:6px;
font-size:14px;
transition:0.3s;
}

.input-box input:focus{
border-color:#0083b0;
outline:none;
box-shadow:0 0 5px rgba(0,131,176,0.3);
}

.input-box i{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#666;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#0083b0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#005f73;
transform:scale(1.03);
}

.error{
color:red;
font-size:13px;
margin-top:8px;
display:none;
}

.strength{
margin-top:6px;
font-size:13px;
}

.weak{color:red;}
.medium{color:orange;}
.strong{color:green;}

.info{
text-align:center;
font-size:13px;
color:#666;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2><i class="fa-solid fa-lock"></i> Reset Password</h2>

<form action="/reset-password" method="POST" onsubmit="return validatePassword()">

<label>New Password</label>

<div class="input-box">
<input type="password" id="password" name="password" placeholder="Enter new password" required onkeyup="checkStrength()">
<i class="fa-solid fa-eye" onclick="togglePassword('password',this)"></i>
</div>

<div id="strength" class="strength"></div>

<label>Confirm Password</label>

<div class="input-box">
<input type="password" id="confirm" placeholder="Confirm password" required>
<i class="fa-solid fa-eye" onclick="togglePassword('confirm',this)"></i>
</div>

<div class="error" id="error-msg">
Passwords do not match
</div>

<button type="submit">
<i class="fa-solid fa-key"></i> Reset Password
</button>

</form>

<div class="info">
Choose a strong password to protect your account
</div>

</div>

<script>

function togglePassword(id,icon){

let field=document.getElementById(id);

if(field.type==="password"){
field.type="text";
icon.classList.remove("fa-eye");
icon.classList.add("fa-eye-slash");
}
else{
field.type="password";
icon.classList.remove("fa-eye-slash");
icon.classList.add("fa-eye");
}

}

function validatePassword(){

let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;
let error=document.getElementById("error-msg");

if(password!==confirm){
error.style.display="block";
return false;
}

return true;
}

function checkStrength(){

let password=document.getElementById("password").value;
let strength=document.getElementById("strength");

if(password.length<6){
strength.innerHTML="Weak Password";
strength.className="strength weak";
}
else if(password.match(/[A-Z]/) && password.match(/[0-9]/)){
strength.innerHTML="Strong Password";
strength.className="strength strong";
}
else{
strength.innerHTML="Medium Strength";
strength.className="strength medium";
}

}

</script>

</body>
</html>
