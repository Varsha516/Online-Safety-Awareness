<!DOCTYPE html>
<html>
<head>

<title>Verify OTP</title>

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(-45deg,#00b4db,#0083b0,#4facfe,#00f2fe);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
width:350px;
text-align:center;
transition:0.3s;
}

.container:hover{
transform:translateY(-6px);
}

h2{
color:#0083b0;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
margin-bottom:15px;
transition:0.3s;
}

input:focus{
border-color:#0083b0;
outline:none;
box-shadow:0 0 6px rgba(0,131,176,0.3);
}

button{
width:100%;
padding:12px;
background:#0083b0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#005f73;
transform:scale(1.03);
}

.timer{
margin-top:12px;
font-size:14px;
color:#444;
}

#timer{
font-weight:bold;
color:#0083b0;
}

#resend{
display:none;
margin-top:10px;
color:#0083b0;
font-weight:bold;
text-decoration:none;
}

#resend:hover{
text-decoration:underline;
}

</style>

<script>

let time = 60;

function startTimer(){

let timer = setInterval(function(){

time--;
document.getElementById("timer").innerHTML = time;

if(time<=0){
clearInterval(timer);
document.getElementById("resend").style.display="block";
}

},1000)

}

window.onload = startTimer;

</script>

</head>

<body>

<div class="container">

<h2>OTP Verification</h2>

<form action="/verify-otp" method="POST">

<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">Verify OTP</button>

</form>

<p class="timer">Resend OTP in <span id="timer">60</span> seconds</p>

<a id="resend" href="/resend-otp">Resend OTP</a>

</div>

</body>

</html>
