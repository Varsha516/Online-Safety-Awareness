<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#00b4db,#0083b0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#0083b0;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#resend{
display:none;
margin-top:10px;
color:#0083b0;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Reset Password</h2>

<form action="/send-otp" method="POST">

<input type="email" name="email" placeholder="Enter your email" required>

<button type="submit">Send OTP</button>

</form>

</div>

</body>
</html>
